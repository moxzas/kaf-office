name: Deploy KAF Enrollment Form

on:
  push:
    branches: [ main ]
    paths:
      - 'src/**'
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for deployment'
        required: false
        default: 'Manual deployment'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Connect to Tailscale
      uses: tailscale/github-action@v3
      with:
        oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
        oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
        tags: tag:ci

    - name: Wait for Tailscale connection
      run: |
        echo "Waiting for Tailscale to establish connection..."
        for i in $(seq 1 30); do
          if tailscale ping -c 1 100.98.110.31 2>/dev/null; then
            echo "Tailscale connection established"
            break
          fi
          echo "Attempt $i/30 - waiting..."
          sleep 2
        done
        tailscale status

    - name: Deploy static files to server
      env:
        SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
      run: |
        mkdir -p ~/.ssh
        echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_deploy
        chmod 600 ~/.ssh/id_deploy
        ssh-keyscan -H 100.98.110.31 >> ~/.ssh/known_hosts 2>/dev/null
        scp -i ~/.ssh/id_deploy -r src/* deploy@100.98.110.31:/home/deploy/webremote/kaf/
        ssh -i ~/.ssh/id_deploy deploy@100.98.110.31 'chmod -R 755 /home/deploy/webremote/kaf/ && echo "Deployment complete! Files accessible at app.sonzai.com/kaf/"'
        rm -f ~/.ssh/id_deploy
